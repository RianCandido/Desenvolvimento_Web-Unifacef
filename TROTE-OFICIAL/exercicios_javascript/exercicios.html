<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css"/>
        <title> Exercícios </title>
        <script src="scripts.js" defer></script>
    </head>
    <body>
        <section>
            <h3> Calculadora da churrasqueira </h3>
            <div>
                <label> Qtde de pessoas </label>
                <input type="number" id="qtdePessoas" value="0" min="0">
            </div>
            <button onclick="churras()">
                Calcula Kgs de carne
            </button>
            <div id="resultadodoChurras">

            </div>
        </section>
        <section>
            <h3> Verificação do Estado febril </h3>
            <div>
                <label> Temperatura </label>
                <input type="number" id="temperatura">
                <button onclick="febre()"> Verificar estado febril </button>
                <div id="resultadoFebril">
                    
            </div>
        </section>
        <section>
            <h3> Autorizador de crédito bancário </h3>
            <div>
                <label> Renda </label>
                <input type="number" id="renda" value="0" min="0">
            </div>
            <div>
                <label> Idade </label>
                <input type="number" id="idade" value="0" min="0">
            </div>
            <button onclick="credito()"> Verificar crédito </button>
            <div id="resultadoCredito">

            </div>
        </section>
        <section>
            <h3> Torneio de Lutas </h3>
            <div>
                <label> Idade </label>
                <input type=" number" id="idadeLuta" min="0" value="0">
            </div>
            <div>
                <label> Peso </label>
                <input type="number" id="peso" min="0" value="0">
            </div>
            <button onclick="luta()"> Categoria lutador </button>
            <div id="resultadoLuta">

            </div>
        </section>
    </body>
</html>
